<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERAQA - Custom Packaging</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0f16;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --white: #ffffff;
            --brand-teal: #0ebcb3;
            --brand-teal-glow: rgba(14, 188, 179, 0.4);
            --text-light: #e0e0e0;
            --text-gray: #a0a0a0;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 188, 179, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(14, 188, 179, 0.08), transparent 25%);
            color: var(--text-light);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Glassmorphism Utility */
        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        /* Header Overrides */
        header {
            border-bottom: var(--glass-border);
            z-index: 1030; /* Bootstrap sticky-top compatible z-index */
        }

        .logo {
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .logo .vera { color: var(--white); }
        .logo .qa { 
            color: var(--brand-teal);
            text-shadow: 0 0 8px var(--brand-teal-glow);
        }

        .nav-link-custom {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 14px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-link-custom:hover {
            color: var(--brand-teal);
            text-shadow: 0 0 8px var(--brand-teal-glow);
        }

        .cart-badge {
            top: -5px;
            right: -10px;
            background-color: var(--brand-teal);
            color: var(--bg-color);
            font-size: 10px;
        }

        /* Sidebar Custom Styles */
        .category-item {
            cursor: pointer;
            transition: color 0.2s ease;
            color: var(--text-gray);
            font-size: 14px;
        }

        .category-item:hover { color: var(--white); }

        .category-item input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--text-gray);
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            margin-top: 0.15rem;
        }

        .category-item input[type="checkbox"]:checked {
            background: var(--brand-teal);
            border-color: var(--brand-teal);
            box-shadow: 0 0 8px var(--brand-teal-glow);
        }

        /* Product Card Overrides */
        .product-card {
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 15px var(--brand-teal-glow);
            border-color: rgba(14, 188, 179, 0.3);
        }

        .product-image {
            height: 140px; /* Slightly smaller for mobile 2-col */
            font-size: 50px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: var(--glass-border);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .product-title {
            color: var(--white);
            font-weight: 500;
        }

        .product-price {
            color: var(--brand-teal);
            text-shadow: 0 0 5px var(--brand-teal-glow);
        }

        .product-moq {
            color: var(--text-gray);
            font-size: 0.75rem;
        }

        .add-to-cart-btn {
            background-color: transparent;
            color: var(--brand-teal);
            border: 1px solid var(--brand-teal);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
        }

        .add-to-cart-btn:hover {
            background-color: var(--brand-teal);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--brand-teal-glow);
        }

        /* Mobile specific adjustments to fit 2 columns nicely */
        @media (max-width: 767px) {
            .product-info-padding { padding: 12px; }
            .product-title { font-size: 14px; margin-bottom: 4px !important; }
            .product-price { font-size: 16px; }
            .add-to-cart-btn { padding: 8px 4px; font-size: 0.7rem; }
        }
        @media (min-width: 768px) {
            .product-info-padding { padding: 20px; }
            .product-title { font-size: 16px; }
            .product-price { font-size: 20px; }
            .product-image { height: 180px; font-size: 70px; }
        }
    </style>
</head>
<body>

    <header class="glass sticky-top py-3 px-3 px-md-5">
        <div class="d-flex justify-content-between align-items-center w-100">
            <div class="logo fs-4">
                <span class="vera">VERA</span><span class="qa">QA</span>
            </div>
            
            <nav class="d-none d-md-flex gap-4 align-items-center">
                <a href="#" class="nav-link-custom">Shop</a>
                <a href="#" class="nav-link-custom">Custom Packaging</a>
                <a href="#" class="nav-link-custom">About</a>
                <a href="#" class="nav-link-custom">Contact</a>
            </nav>

            <div class="position-relative" style="cursor: pointer;">
                <span class="fs-5">🛒</span>
                <span class="position-absolute rounded-pill fw-bold px-1 cart-badge" id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="container-fluid py-4 px-3 px-md-5" style="max-width: 1400px;">
        <div class="row g-4">
            
            <aside class="col-12 col-lg-3 col-xl-2">
                <div class="glass p-4 rounded-3 h-100">
                    <h3 class="text-white fs-6 fw-bold mb-3 letter-spacing-1">Categories</h3>
                    <div class="d-flex flex-column gap-3" id="category-filters">
                        </div>
                </div>
            </aside>

            <section class="col-12 col-lg-9 col-xl-10">
                <div class="row g-3 g-md-4" id="product-container">
                    </div>
            </section>
            
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Data Structure
        const products = [
            { id: 1, title: 'Mailer Box', price: 12, moq: 100, icon: '📦', category: 'mailer' },
            { id: 2, title: 'Rigid Box', price: 35, moq: 50, icon: '🎁', category: 'rigid' },
            { id: 3, title: 'Paper Bag', price: 8, moq: 200, icon: '🛍️', category: 'bags' },
            { id: 4, title: 'Custom Label', price: 2, moq: 500, icon: '🏷️', category: 'labels' },
            { id: 5, title: 'Tape Roll', price: 5, moq: 300, icon: '🧻', category: 'labels' },
            { id: 6, title: 'Bubble Wrap', price: 45, moq: 10, icon: '🫧', category: 'mailer' }
        ];

        const categories = [
            { id: 'mailer', label: 'Mailer Boxes' },
            { id: 'rigid', label: 'Rigid Boxes' },
            { id: 'bags', label: 'Paper Bags' },
            { id: 'labels', label: 'Labels & Tape' }
        ];

        // State
        let cartItems = 0;

        // DOM Elements
        const productContainer = document.getElementById('product-container');
        const filterContainer = document.getElementById('category-filters');
        const cartCountBadge = document.getElementById('cart-count');

        // Render Filters
        function renderFilters() {
            filterContainer.innerHTML = categories.map(cat => `
                <label class="category-item d-flex align-items-start gap-2">
                    <input type="checkbox" value="${cat.id}"> 
                    <span>${cat.label}</span>
                </label>
            `).join('');
        }

        // Render Products with Bootstrap Grid Classes applied to the wrapper
        function renderProducts(items) {
            productContainer.innerHTML = items.map(product => `
                <div class="col-6 col-md-4 col-xl-3">
                    <div class="product-card glass h-100 d-flex flex-column">
                        <div class="product-image d-flex justify-content-center align-items-center w-100">${product.icon}</div>
                        <div class="product-info-padding d-flex flex-column flex-grow-1">
                            <h4 class="product-title mb-2 text-truncate">${product.title}</h4>
                            <div class="d-flex justify-content-between align-items-baseline mb-3">
                                <span class="product-price fw-bold">₹${product.price}</span>
                                <span class="product-moq text-end">MOQ ${product.moq}</span>
                            </div>
                            <button class="add-to-cart-btn w-100 rounded-2 fw-bold mt-auto py-2" onclick="addToCart()">Add To Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Interactivity
        function addToCart() {
            cartItems++;
            cartCountBadge.innerText = cartItems;
            
            cartCountBadge.style.transform = 'scale(1.3)';
            setTimeout(() => { cartCountBadge.style.transform = 'scale(1)'; }, 200);
        }

        // Initialization
        renderFilters();
        renderProducts(products); // I added a couple extra placeholder products so you can test the grid wrapping!
    </script>
</body>
</html>
